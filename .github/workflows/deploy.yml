name: Desplegar en GitHub Pages

# Se ejecuta en cada push a main y también manualmente desde la pestaña Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el despliegue de Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Generar iconos PWA
        run: npm run icons

      - name: Compilar (base se ajusta solo al nombre del repo)
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en Pages
        id: deployment
        uses: actions/deploy-pages@v4
